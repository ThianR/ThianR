<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Cristhian Sanabria - Developer Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101317"/>
      <stop offset="60%" stop-color="#151a20"/>
      <stop offset="100%" stop-color="#0e1116"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb86c"/>
      <stop offset="50%" stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <clipPath id="clipL0" clipPathUnits="userSpaceOnUse">
      <rect id="rectL0" x="18" y="10" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL1" clipPathUnits="userSpaceOnUse">
      <rect id="rectL1" x="18" y="23" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL2" clipPathUnits="userSpaceOnUse">
      <rect id="rectL2" x="18" y="36" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL3" clipPathUnits="userSpaceOnUse">
      <rect id="rectL3" x="18" y="49" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL4" clipPathUnits="userSpaceOnUse">
      <rect id="rectL4" x="18" y="62" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL5" clipPathUnits="userSpaceOnUse">
      <rect id="rectL5" x="18" y="75" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL6" clipPathUnits="userSpaceOnUse">
      <rect id="rectL6" x="18" y="88" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL7" clipPathUnits="userSpaceOnUse">
      <rect id="rectL7" x="18" y="101" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL8" clipPathUnits="userSpaceOnUse">
      <rect id="rectL8" x="18" y="114" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL9" clipPathUnits="userSpaceOnUse">
      <rect id="rectL9" x="18" y="127" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
    <clipPath id="clipL10" clipPathUnits="userSpaceOnUse">
      <rect id="rectL10" x="18" y="140" width="0" height="14" rx="2" ry="2"/>
    </clipPath>
</defs>

  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
    .muted { fill: rgba(255,255,255,0.70); }
    .dim { fill: rgba(255,255,255,0.52); }
    .chip { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.12); stroke-width: 1; }
    .chipText { fill: rgba(255,255,255,0.82); font-size: 14px; letter-spacing: 0.3px; }
    .code { fill: rgba(255,255,255,0.86); font-size: 12px; }
    .kw { fill: #8be9fd; }
    .type { fill: #bd93f9; }
    .fn { fill: #50fa7b; }
    .str { fill: #ffb86c; }
    .cm { fill: rgba(255,255,255,0.45); }
    .warn { fill: #ff5555; }
    #banner:hover .accentLine { opacity: 1; }
    #banner:hover .hoverGlow { opacity: 1; }
    #banner:hover .chip { stroke-opacity: 0.35; }
    #banner:hover .pulse { animation-play-state: paused; }
    .pulse { animation: pulse 2.8s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.75; }
      50% { opacity: 1; }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes typeL0 {
      0%, 0.0000% { width: 0; }
      1.7517%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL0 {
      animation: typeL0 8.0s steps(8, end) infinite;
    }
    @keyframes typeL1 {
      0%, 1.7517% { width: 0; }
      5.6445%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL1 {
      animation: typeL1 8.0s steps(20, end) infinite;
    }
    @keyframes typeL2 {
      0%, 5.6445% { width: 0; }
      11.8728%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL2 {
      animation: typeL2 8.0s steps(32, end) infinite;
    }
    @keyframes typeL3 {
      0%, 11.8728% { width: 0; }
      13.6246%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL3 {
      animation: typeL3 8.0s steps(8, end) infinite;
    }
    @keyframes typeL4 {
      0%, 13.6246% { width: 0; }
      18.2958%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL4 {
      animation: typeL4 8.0s steps(24, end) infinite;
    }
    @keyframes typeL5 {
      0%, 18.2958% { width: 0; }
      29.1955%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL5 {
      animation: typeL5 8.0s steps(56, end) infinite;
    }
    @keyframes typeL6 {
      0%, 29.1955% { width: 0; }
      36.9810%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL6 {
      animation: typeL6 8.0s steps(40, end) infinite;
    }
    @keyframes typeL7 {
      0%, 36.9810% { width: 0; }
      44.7664%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL7 {
      animation: typeL7 8.0s steps(40, end) infinite;
    }
    @keyframes typeL8 {
      0%, 44.7664% { width: 0; }
      52.7465%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL8 {
      animation: typeL8 8.0s steps(41, end) infinite;
    }
    @keyframes typeL9 {
      0%, 52.7465% { width: 0; }
      54.4983%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL9 {
      animation: typeL9 8.0s steps(8, end) infinite;
    }
    @keyframes typeL10 {
      0%, 54.4983% { width: 0; }
      56.2500%, 93.7500% { width: 820px; }
      100% { width: 0; }
    }
    #rectL10 {
      animation: typeL10 8.0s steps(8, end) infinite;
    }
  </style>

  <g id="banner">
    <!-- Background -->
    <rect x="0" y="0" width="1280" height="320" fill="url(#bg)"/>
    <rect x="0" y="0" width="1280" height="320" fill="url(#grid)"/>

    <!-- Subtle accent line -->
    <rect class="accentLine" x="0" y="0" width="1280" height="4" fill="url(#accent)" opacity="0.65"/>

    <!-- Left icon card -->
    <g transform="translate(58,54)" filter="url(#softShadow)">
      <rect x="0" y="0" width="220" height="212" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)"/>
      <circle cx="110" cy="88" r="56" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)"/>
      <!-- Minimal "dev" mark -->
      <g transform="translate(110,88)">
        <path d="M -26 18 L -44 0 L -26 -18" fill="none" stroke="#8be9fd" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
        <path d="M 26 18 L 44 0 L 26 -18" fill="none" stroke="#50fa7b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
        <path d="M -6 26 L 6 -26" fill="none" stroke="#ffb86c" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
      </g>

      <text class="sans muted" x="20" y="164" font-size="14">Learning &amp; Developing</text>
      <text class="sans" x="20" y="192" font-size="22" fill="white" font-weight="700">Cristhian</text>
    </g>

    <!-- Main code panel -->
    <g transform="translate(308,44)" filter="url(#softShadow)">
      <rect x="0" y="0" width="914" height="260" rx="22" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
      <!-- Title -->
      <text class="sans" x="26" y="44" font-size="26" fill="white" font-weight="800">public class <tspan fill="#bd93f9">Developer</tspan></text>
      <text class="sans dim" x="26" y="70" font-size="14">author: Cristhian | status: Learning &amp; Developing</text>

      <!-- Typing area (clipped) -->
      <g transform="translate(26,92)">
        <rect x="0" y="0" width="862" height="160" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)"/>
        <g>
          <g clip-path="url(#clipL0)">
            <text class="mono code cm" x="18" y="22">/**</text>
          </g>
          <g clip-path="url(#clipL1)">
            <text class="mono code cm" x="18" y="35"> * @author Cristhian</text>
          </g>
          <g clip-path="url(#clipL2)">
            <text class="mono code cm" x="18" y="48"> * @status Learning &amp; Developing</text>
          </g>
          <g clip-path="url(#clipL3)">
            <text class="mono code cm" x="18" y="61"> */</text>
          </g>
          <g clip-path="url(#clipL4)">
            <text class="mono code" x="18" y="74">
              <tspan class="kw">public</tspan><tspan> </tspan><tspan class="kw">class</tspan><tspan> </tspan><tspan class="type">Developer</tspan><tspan> {</tspan>
            </text>
          </g>
          <g clip-path="url(#clipL5)">
            <text class="mono code" x="18" y="87">
              <tspan>  </tspan><tspan class="kw">private</tspan><tspan> </tspan><tspan class="type">Map</tspan><tspan>&lt;</tspan><tspan class="type">String</tspan><tspan>, </tspan><tspan class="type">Integer</tspan><tspan>&gt;</tspan><tspan> skills = </tspan><tspan class="kw">new</tspan><tspan> </tspan><tspan class="type">HashMap</tspan><tspan>&lt;&gt;();</tspan>
            </text>
          </g>
          <g clip-path="url(#clipL6)">
            <text class="mono code" x="18" y="100">
              <tspan>  </tspan><tspan class="kw">public</tspan><tspan> </tspan><tspan class="type">Developer</tspan><tspan> </tspan><tspan class="fn">evolve</tspan><tspan>(</tspan><tspan class="type">String</tspan><tspan> tech) {</tspan>
            </text>
          </g>
          <g clip-path="url(#clipL7)">
            <text class="mono code" x="18" y="113">
              <tspan>    skills.merge(tech, 1, Integer::sum);</tspan>
            </text>
          </g>
          <g clip-path="url(#clipL8)">
            <text class="mono code" x="18" y="126">
              <tspan>    </tspan><tspan class="kw">return</tspan><tspan> </tspan><tspan class="kw">this</tspan><tspan>;</tspan><tspan class="cm"> // Pointing to success++</tspan>
            </text>
          </g>
          <g clip-path="url(#clipL9)">
            <text class="mono code" x="18" y="139">  }</text>
          </g>
          <g clip-path="url(#clipL10)">
            <text class="mono code" x="18" y="152">}</text>
          </g>
        </g><!-- Cursor -->
        <rect x="20" y="14" width="2" height="12" fill="#ffffff" opacity="0.7">
          <animate attributeName="opacity" values="0.0;1.0;0.0" dur="1.1s" repeatCount="indefinite"/>
        </rect>
</g>
    </g>

    <!-- Skill chips -->
    <g transform="translate(58,284)">
      <g>
        <rect class="chip" x="0" y="0" width="98" height="28" rx="14"/>
        <text class="sans chipText" x="18" y="19">Java</text>
      </g>
      <g transform="translate(108,0)">
        <rect class="chip" x="0" y="0" width="122" height="28" rx="14"/>
        <text class="sans chipText" x="18" y="19">Spring Boot</text>
      </g>
      <g transform="translate(242,0)">
        <rect class="chip" x="0" y="0" width="88" height="28" rx="14"/>
        <text class="sans chipText" x="18" y="19">Oracle</text>
      </g>
      <g transform="translate(340,0)">
        <rect class="chip" x="0" y="0" width="74" height="28" rx="14"/>
        <text class="sans chipText" x="18" y="19">APEX</text>
      </g>
      <g transform="translate(424,0)">
        <rect class="chip" x="0" y="0" width="86" height="28" rx="14"/>
        <text class="sans chipText" x="18" y="19">Vaadin</text>
      </g>
      <g transform="translate(520,0)">
        <rect class="chip" x="0" y="0" width="70" height="28" rx="14"/>
        <text class="sans chipText" x="18" y="19">SQL</text>
      </g>
      <g transform="translate(600,0)">
        <rect class="chip" x="0" y="0" width="112" height="28" rx="14"/>
        <text class="sans chipText" x="18" y="19">PrimeFaces</text>
      </g>
      <g transform="translate(724,0)">
        <rect class="chip" x="0" y="0" width="96" height="28" rx="14"/>
        <text class="sans chipText" x="18" y="19">Angular</text>
      </g>
    </g>

    <!-- Hover glow hint -->
    <g class="hoverGlow" opacity="0" transform="translate(1060,286)">
      <rect x="0" y="0" width="162" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
      <text class="sans" x="18" y="19" font-size="13" fill="rgba(255,255,255,0.85)">hover to pause</text>
    </g>

    <!-- Bottom right signature -->
    <text class="mono dim" x="1060" y="40" font-size="12">github.com/ThianR</text>
  </g>
</svg>
